openapi: 3.0.0
info:
  title: Simple Inventory API
  description: This is a simple API
  contact:
    email: you@your-company.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - url: https://virtserver.swaggerhub.com/tutorial/1.0.0
    description: SwaggerHub API Auto Mocking
paths:
  /student/{student_id}:
    get:
      summary: gets student
      description: Returns a single student
      operationId: get_student_by_id
      parameters:
        - name: student_id
          in: path
          description: the integer
          required: true
          style: simple
          explode: false
          schema:
            type: number
            format: integer
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Invalid ID
        "404":
          description: Not found
      x-openapi-router-controller: swagger_server.controllers.default_controller
    delete:
      summary: Delete student
      description: Deletes a single student
      operationId: delete_student
      parameters:
        - name: student_id
          in: path
          description: the integer
          required: true
          style: simple
          explode: false
          schema:
            type: number
            format: integer
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Bad Request
        "404":
          description: Student with specified student_id cannot be found
      x-openapi-router-controller: swagger_server.controllers.default_controller
  /student:
    post:
      summary: Add a new student
      description: Adds an item to the system
      operationId: add_student
      requestBody:
        description: Student item to add
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Student"
      responses:
        "200":
          description: created
          content:
            application/json:
              schema:
                type: number
                format: integer
                x-content-type: application/json
        "400":
          description: "invalid input, object invalid"
        "409":
          description: Already exists
      x-openapi-router-controller: swagger_server.controllers.default_controller
  /student/{student_id}/average_grade:
    get:
      summary: Get average grade
      description: Returns the average grade of the student with specified student_id
      operationId: get_average_grade
      parameters:
        - name: student_id
          in: path
          description: the integer
          required: true
          style: simple
          explode: false
          schema:
            type: number
            format: integer
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: number
                format: float
                x-content-type: application/json
        "400":
          description: Invalid ID
        "404":
          description: Student does not exist, or has no grade records
      x-openapi-router-controller: swagger_server.controllers.default_controller
components:
  schemas:
    Student:
      required:
        - first_name
        - last_name
      type: object
      properties:
        student_id:
          type: number
          format: integer
        first_name:
          type: string
        last_name:
          type: string
        grade_records:
          type: array
          items:
            $ref: "#/components/schemas/GradeRecord"
      example:
        first_name: first_name
        last_name: last_name
        grade_records:
          - grade: 0.8008282
            subject_name: subject_name
          - grade: 0.8008282
            subject_name: subject_name
    GradeRecord:
      required:
        - grade
        - subject_name
      type: object
      properties:
        subject_name:
          type: string
        grade:
          maximum: 10
          minimum: 0
          type: number
          format: float
      example:
        grade: 0.8008282
        subject_name: subject_name
