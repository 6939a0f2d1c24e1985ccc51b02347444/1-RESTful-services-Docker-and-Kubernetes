name: Build Test and push
on: [push, workflow_dispatch]
env:
  IMAGE_NAME: student_service
  REPO_NAME: tijnvdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Build docker
        run: |
          docker build . -t $REPO_NAME/$IMAGE_NAME

      - name: Start MongoDB
        run: |
          docker network create student_service_network
          docker run -d --name mongo --network student_service_network -p 27017:27017 mongo:4

      - name: run docker
        run: |
          docker run -d --name student_service --network student_service_network \
            -e MONGO_URI=mongodb://mongo:27017 \
            -p 8080:8080 \
            $REPO_NAME/$IMAGE_NAME
          sleep 10 # Wait for the service to start

      - name: "Check files existence"
        uses: andstor/file-existence-action@v2
        with:
          files: "postman/collection.json,postman/environment.json"
          fail: true

      - name: Run API Tests
        id: run-newman
        uses: anthonyvscode/newman-action@master
        with:
          collection: postman/collection.json
          environment: postman/environment.json
          reporters: cli
          bail: true

      - name: Check if we failed
        id: fail-check
        shell: bash
        env:
          JSON_DOC: ${{ steps.run-newman.outputs.summary }}
        run: |
          printf '%s\n' "$JSON_DOC" > summary.json
          cat summary.json
          if grep -q Collection summary.json; then
            echo "failed=false" >> $GITHUB_OUTPUT;
          else
            echo "failed=true" >> $GITHUB_OUTPUT;
          fi

      - name: fail if empty
        if: ${{ steps.fail-check.outputs.failed == 'true' }}
        run: exit 1

      - name: Login to Container Registry
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push image to docker hub Container Registry
        run: |
          docker push $REPO_NAME/$IMAGE_NAME
